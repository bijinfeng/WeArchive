
<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>桌面端微信聊天记录备份</title>
<style>
:root{
  color-scheme:light;
  --bg:linear-gradient(135deg,#e8edf2,#f7f8f9 58%,#e9edf1);
  --window:#fbfcfd;--titlebar:rgba(250,251,252,.96);--sidebar:#fbfbfc;
  --surface:#fff;--surface-2:#f7f8fa;--surface-3:#edf1f4;--hover:#e3e8ec;
  --line:#dde3e8;--line-2:#cbd4dc;--text:#12191f;--muted:#65717c;--subtle:#8d98a3;
  --green:#07c160;--green-2:#e6f8ee;--green-3:#8be7b5;
  --blue:#1d64a7;--blue-2:#e8f1fb;--amber:#8a5a13;--amber-2:#fff2d6;--red:#b42318;--red-2:#fee4e2;
  --shadow:0 24px 70px rgba(20,31,40,.16),0 2px 12px rgba(20,31,40,.08);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --bg:linear-gradient(135deg,#070a0e,#111821 58%,#0a0f15);
  --window:#101821;--titlebar:rgba(16,24,33,.96);--sidebar:#111922;
  --surface:#17212b;--surface-2:#121922;--surface-3:#22303d;--hover:#2b3946;
  --line:#2c3946;--line-2:#415160;--text:#e9eff6;--muted:#9aa8b6;--subtle:#738292;
  --green:#39d978;--green-2:#0b2f1a;--green-3:#1f7a45;
  --blue:#7cbdff;--blue-2:#102a44;--amber:#f1c45c;--amber-2:#342813;--red:#ff8a7d;--red-2:#351b1b;
  --shadow:0 24px 70px rgba(0,0,0,.44),0 2px 12px rgba(0,0,0,.34);
}
*{box-sizing:border-box}
html,body{height:100%;min-height:0}
body{margin:0;background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden;letter-spacing:0}
button,input{font:inherit}
button{border:0;cursor:pointer}
button:focus-visible,input:focus-visible{outline:2px solid #8be7b5;outline-offset:2px}
button[disabled]{cursor:not-allowed;opacity:.52}
svg{width:18px;height:18px;display:block;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
mark{background:#fff1a6;color:#12191f;border-radius:4px;padding:0 2px}
html[data-theme="dark"] mark{background:#5b4713;color:#fff3b0}
.icon-defs{position:absolute;width:0;height:0;overflow:hidden}
.stage{height:100%;padding:22px;display:grid;place-items:center}
.window{position:relative;width:min(1440px,calc(100vw - 44px));height:min(900px,calc(100vh - 44px));min-height:720px;background:var(--window);border:1px solid rgba(130,145,160,.5);box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-rows:54px 1fr}
.window[data-os="mac"]{border-radius:18px}.window[data-os="win"]{border-radius:10px}
.titlebar{height:54px;display:grid;grid-template-columns:156px minmax(260px,1fr) auto;align-items:center;gap:12px;padding:0 0 0 14px;background:var(--titlebar);border-bottom:1px solid var(--line);user-select:none}
.window[data-os="win"] .titlebar{grid-template-columns:190px minmax(260px,1fr) auto;padding-left:12px}
.title-left{min-width:0;display:flex;align-items:center;gap:12px}
.mac-traffic{display:flex;gap:8px;flex:0 0 auto}.dot{width:12px;height:12px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.16)}
.dot.close{background:#ff5f57}.dot.min{background:#febc2e}.dot.max{background:#28c840}
.win-title{display:none;min-width:0;color:var(--text);font-size:12px;font-weight:720;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.window[data-os="win"] .mac-traffic{display:none}.window[data-os="win"] .win-title{display:block}
.title-icon-btn{width:30px;height:30px;border-radius:8px;background:transparent;color:var(--muted);display:grid;place-items:center;flex:0 0 auto;transition:.14s}
.title-icon-btn:hover,.title-icon-btn.active{background:var(--surface-3);color:var(--text)}
.title-icon-btn:active,.btn:active,.nav-btn:active,.option:active,.chat-item:active,.account-row:active,.task-card:active,.contact-row:active{transform:scale(.98)}
.title-center{display:flex;align-items:center;gap:10px;min-width:0}
.search{height:34px;max-width:560px;flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:0 6px 0 10px;color:var(--subtle);transition:.16s}
.search.has-query{background:var(--surface);border-color:#8be7b5;box-shadow:0 0 0 3px rgba(7,193,96,.08)}
.search input{width:100%;min-width:0;border:0;background:transparent;outline:0;color:var(--text);font-size:13px}
.search-count{min-width:52px;height:22px;border-radius:6px;padding:0 7px;display:grid;place-items:center;background:var(--surface-3);color:var(--muted);font-size:11px;font-weight:760;white-space:nowrap}
.clear-search{width:22px;height:22px;border-radius:6px;background:transparent;color:var(--muted);display:none;place-items:center}
.search.has-query .clear-search{display:grid}.clear-search:hover{background:var(--surface-3);color:var(--text)}
.state-chip{height:30px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border-radius:8px;background:var(--green-2);color:var(--green);font-size:12px;font-weight:760;white-space:nowrap}
.state-chip svg{width:15px;height:15px}.state-chip.hidden{display:none}
.title-right{height:100%;display:flex;align-items:center;gap:8px}
.btn{position:relative;height:34px;border-radius:8px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--surface-3);color:var(--text);font-size:13px;font-weight:720;white-space:nowrap;transition:background .14s,transform .08s,box-shadow .14s}
.btn:hover{background:var(--hover)}.btn.primary{background:var(--green);color:#fff}.btn.primary:hover{background:#06ad56}
.btn.blue{background:var(--blue-2);color:var(--blue)}.btn.amber{background:var(--amber-2);color:var(--amber)}.btn.danger{background:var(--red-2);color:var(--red)}
.btn.flat{background:transparent;color:var(--muted)}.btn.flat:hover{background:var(--surface-3);color:var(--text)}
.icon-btn{width:34px;padding:0;display:grid;place-items:center}
.os-switch{height:28px;display:flex;align-items:center;gap:2px;padding:2px;background:var(--surface-3);border:1px solid var(--line);border-radius:8px}
.os-switch button{height:22px;min-width:66px;border-radius:6px;background:transparent;color:var(--muted);font-size:12px;font-weight:760}
.os-switch button.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(20,31,40,.08)}
.win-controls{height:100%;display:none;margin-left:2px}.window[data-os="win"] .win-controls{display:flex}
.win-btn{width:46px;height:100%;background:transparent;color:var(--text);display:grid;place-items:center}.win-btn:hover{background:var(--surface-3)}.win-btn.close:hover{background:#d92d20;color:#fff}

.app{min-height:0;display:grid;grid-template-columns:248px minmax(0,1fr);background:var(--window);transition:grid-template-columns .18s ease}
.app.sidebar-collapsed{grid-template-columns:72px minmax(0,1fr)}
.sidebar{min-width:0;border-right:1px solid var(--line);background:var(--sidebar);padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}
.app.sidebar-collapsed .sidebar{padding:14px 9px}
.app.sidebar-collapsed .brand-text,.app.sidebar-collapsed .nav-label,.app.sidebar-collapsed .nav-btn .count,.app.sidebar-collapsed .library-main,.app.sidebar-collapsed .nav-group-title,.app.sidebar-collapsed .nav-v1{display:none}
.app.sidebar-collapsed .brand{justify-content:center}.app.sidebar-collapsed .nav-btn{justify-content:center;padding:0}.app.sidebar-collapsed .nav-btn .count{display:none}
.brand{min-height:48px;display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:34px;height:34px;border-radius:8px;background:#101820;color:#fff;display:grid;place-items:center;flex:0 0 auto}
.brand-mark svg{width:20px;height:20px}.brand-text{min-width:0}
.brand-text strong{display:block;font-size:14px;font-weight:780;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-text span{display:block;margin-top:2px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
nav{min-width:0;overflow:auto;padding-right:2px}
.nav-group-title{margin:18px 8px 8px;font-size:11px;font-weight:780;color:var(--subtle);text-transform:uppercase}.nav-group-title:first-child{margin-top:4px}
.nav-btn{width:100%;height:40px;border-radius:8px;background:transparent;color:var(--text);display:flex;align-items:center;gap:10px;padding:0 10px;text-align:left;font-size:13px;font-weight:680;transition:.14s;position:relative}
.nav-btn:hover{background:var(--surface-3)}.nav-btn.active{background:var(--green-2);color:var(--green)}
.nav-btn .count{margin-left:auto;min-width:20px;height:20px;border-radius:999px;display:grid;place-items:center;background:var(--surface-3);color:var(--muted);font-size:11px;font-weight:760;padding:0 6px}
.nav-btn.active .count{background:#d8f5e4;color:var(--green)}
.nav-v1{display:inline-flex;align-items:center;justify-content:center;height:18px;padding:0 6px;border-radius:999px;background:var(--amber-2);color:var(--amber);font-size:10px;font-weight:780;margin-left:6px}
.library-status{height:54px;border:1px solid var(--line);border-radius:8px;background:var(--surface);display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:8px;color:var(--text);text-align:left;width:100%}
.library-status:hover{border-color:#b8c6cf;background:var(--surface)}
.library-icon{width:28px;height:28px;border-radius:8px;background:var(--surface-3);display:grid;place-items:center;color:var(--muted);position:relative}
.health-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--surface);position:absolute;right:-2px;bottom:-2px}
.health-dot.warn{background:var(--amber)}.health-dot.error{background:var(--red)}
.library-main{min-width:0}.library-main strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.library-main span{display:block;margin-top:3px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.library-status .chev{color:var(--subtle)}

.main{min-width:0;min-height:0;overflow:hidden;position:relative}
.page{height:100%;display:grid;grid-template-rows:auto 1fr;min-height:0}
.page-head{padding:20px 22px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:1px solid rgba(221,227,232,.5)}
.page-title{min-width:0}.page-title h1{margin:0;font-size:22px;line-height:1.2;font-weight:780}
.page-title p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
.page-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end}
.content{min-height:0;overflow:auto;padding:18px 22px 22px}
.content::-webkit-scrollbar,.chat-list::-webkit-scrollbar,.messages::-webkit-scrollbar,.detail-side::-webkit-scrollbar,.transfer-queue::-webkit-scrollbar,.drawer-body::-webkit-scrollbar,nav::-webkit-scrollbar,.contact-list::-webkit-scrollbar,.contact-cats::-webkit-scrollbar{width:10px;height:10px}
.content::-webkit-scrollbar-thumb,.chat-list::-webkit-scrollbar-thumb,.messages::-webkit-scrollbar-thumb,.detail-side::-webkit-scrollbar-thumb,.transfer-queue::-webkit-scrollbar-thumb,.drawer-body::-webkit-scrollbar-thumb,nav::-webkit-scrollbar-thumb,.contact-list::-webkit-scrollbar-thumb,.contact-cats::-webkit-scrollbar-thumb{background:var(--line-2);border:2px solid transparent;border-radius:10px;background-clip:content-box}
.grid{display:grid;gap:14px}.stack{display:grid;gap:12px}.home-stack{display:grid;gap:14px}
.card{min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:0 1px 0 rgba(17,24,28,.02)}
.card-head{min-height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px}
.card-head h2,.card-head h3{margin:0;font-size:13px;font-weight:780}
.card-body{padding:14px}
.badge{display:inline-flex;align-items:center;justify-content:center;min-height:22px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:780;white-space:nowrap}
.badge.green{background:var(--green-2);color:var(--green)}.badge.blue{background:var(--blue-2);color:var(--blue)}.badge.amber{background:var(--amber-2);color:var(--amber)}.badge.red{background:var(--red-2);color:var(--red)}.badge.gray{background:var(--surface-3);color:var(--muted)}
.progress{height:7px;border-radius:999px;background:var(--surface-3);overflow:hidden;margin-top:7px}
.progress span{display:block;height:100%;border-radius:999px;background:var(--green);transition:width .25s}.progress.blue span{background:var(--blue)}.progress.amber span{background:var(--amber)}.progress.red span{background:var(--red)}
.muted{color:var(--muted)}.small{font-size:12px}.strong{font-weight:780}
.empty{min-height:280px;border:1px dashed var(--line-2);border-radius:8px;background:var(--surface-2);display:grid;place-items:center;text-align:center;padding:28px;color:var(--muted)}
.empty strong{display:block;color:var(--text);font-size:15px;margin-bottom:6px}.empty .btn{margin-top:14px}
.notice{border:1px solid var(--line);border-radius:8px;background:var(--surface-2);padding:12px;display:grid;gap:6px;font-size:12px;color:var(--muted);line-height:1.45}
.notice.green{border-color:#8be7b5;background:#f1fcf6;color:#087d42}.notice.amber{border-color:#efd49b;background:#fff9ea;color:#6e4c19}
.notice.red{border-color:#f1b5ae;background:#fff7f6;color:#84251d}.notice.blue{border-color:#bad4ed;background:#f4f9ff;color:#244d74}
html[data-theme="dark"] .notice.green{background:#0b2f1a;color:#8ef0b3;border-color:#1f7a45}
html[data-theme="dark"] .notice.amber{background:#2e2412;color:#f1d38d;border-color:#5f4a1e}
html[data-theme="dark"] .notice.red{background:#301717;color:#ffb0a7;border-color:#6a2f2f}
html[data-theme="dark"] .notice.blue{background:#12263a;color:#a3cbf3;border-color:#284b6f}

.summary-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;padding:18px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(135deg,var(--surface),var(--surface-2))}
.summary-copy h2{margin:0;font-size:24px;line-height:1.18;font-weight:840}.summary-copy p{margin:8px 0 0;font-size:13px;color:var(--muted);line-height:1.55}
.summary-actions{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;justify-content:flex-end}
.summary-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.summary-pill{height:28px;border-radius:999px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:760}

.account-console{display:grid;grid-template-columns:minmax(0,1fr) 360px;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 10px 28px rgba(20,31,40,.06)}
.identity-panel{padding:22px;display:grid;gap:18px;background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%)}
.identity-head{display:flex;align-items:center;gap:16px;min-width:0}
.avatar-hero{width:68px;height:68px;border-radius:16px;display:grid;place-items:center;color:#fff;font-size:24px;font-weight:850;position:relative;flex:0 0 auto;box-shadow:0 12px 26px rgba(18,25,31,.16)}
.avatar-hero.green,.mini-avatar.green{background:#07c160}.avatar-hero.blue,.mini-avatar.blue{background:#285f98}.avatar-hero.dark,.mini-avatar.dark{background:#2d3742}.avatar-hero.amber,.mini-avatar.amber{background:#9e6717}
.avatar-hero span{width:13px;height:13px;border-radius:50%;background:#07c160;border:2px solid #fff;position:absolute;right:-2px;bottom:-2px}
.identity-copy{min-width:0}.eyebrow{font-size:12px;color:var(--green);font-weight:780;margin-bottom:4px}
.identity-copy h2{margin:0;font-size:30px;line-height:1.08;font-weight:850}
.identity-copy p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
.scope-note{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:12px 14px;display:grid;grid-template-columns:112px 1fr;gap:12px;align-items:start}
.scope-note b{font-size:12px}.scope-note span{font-size:12px;color:var(--muted);line-height:1.5}
.metric-strip{border:1px solid var(--line);border-radius:8px;background:var(--surface);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));overflow:hidden}
.metric-strip div{padding:12px;border-right:1px solid var(--line);min-width:0}.metric-strip div:last-child{border-right:0}
.metric-strip span{font-size:12px;color:var(--muted)}.metric-strip strong{display:block;margin-top:6px;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.identity-actions{display:flex;gap:8px;flex-wrap:wrap}
.account-rail{border-left:1px solid var(--line);background:var(--surface-2);padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;min-width:0}
.rail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.rail-head h2{margin:0;font-size:15px;line-height:1.25;font-weight:820}.rail-head p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.4}
.account-list{display:grid;gap:8px;align-content:start}
.account-row{width:100%;height:70px;border-radius:9px;background:transparent;color:var(--text);display:grid;grid-template-columns:38px minmax(0,1fr) auto;align-items:center;gap:10px;padding:8px;border:1px solid transparent;text-align:left;transition:.14s;position:relative}
.account-row:hover{background:var(--surface);border-color:#d5dde4}
.account-row.active{background:var(--surface);border-color:#bfcbd4;box-shadow:0 1px 3px rgba(20,31,40,.08)}
.account-row.active:before{content:"";width:3px;height:38px;border-radius:999px;background:var(--green);position:absolute;left:0;top:16px}
.mini-avatar{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:820;flex:0 0 auto}
.meta{min-width:0}.meta strong{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta span{display:block;margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-state{display:grid;justify-items:end;gap:5px}.row-state small{font-size:11px;color:var(--subtle);white-space:nowrap}
.scan-line{height:38px;border:1px dashed #c7d2da;border-radius:8px;background:var(--surface);color:#40505d;font-size:12px;font-weight:760;display:flex;align-items:center;justify-content:center;gap:7px}
.scan-line:hover{border-color:#9fb0bd;background:var(--surface)}

.kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
.kpi{padding:14px}.kpi span{font-size:12px;color:var(--muted)}.kpi strong{display:block;font-size:24px;margin-top:8px}.kpi small{display:inline-flex;margin-top:8px;color:var(--green);font-weight:760}
.home-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
.charts-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:14px}
.chart-card{padding:14px}.chart-title{display:flex;align-items:center;justify-content:space-between;gap:8px}.chart-title h3{margin:0;font-size:13px;font-weight:780}.chart-title span{font-size:11px;color:var(--muted)}
.bars{display:flex;align-items:flex-end;gap:10px;height:170px;margin-top:14px;padding-top:8px}.bar-col{flex:1;display:grid;gap:8px;justify-items:center}.bar{width:100%;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,#8ef0b3,var(--green));min-height:24px;position:relative}.bar small{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted)}.bar-col label{font-size:11px;color:var(--muted)}
.rank-list{display:grid;gap:10px;margin-top:14px}.rank-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.rank-row .track{height:8px;border-radius:999px;background:var(--surface-3);overflow:hidden}.rank-row .track span{display:block;height:100%;border-radius:999px;background:var(--blue)}.rank-row strong{font-size:12px}.rank-row small{font-size:11px;color:var(--muted)}
.pie-list{display:grid;gap:10px;margin-top:14px}.pie-row{display:grid;grid-template-columns:74px 1fr auto;gap:10px;align-items:center}.pie-chip{height:22px;border-radius:999px;padding:0 8px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:760;background:var(--surface-3);color:var(--text)}

.option-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.option-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.option{width:100%;min-height:76px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--text);padding:12px;text-align:left;display:grid;gap:6px;transition:.14s}
.option:hover{border-color:#aebcc6;background:var(--surface)}.option.active{border-color:#8be7b5;background:#f1fcf6;box-shadow:0 0 0 3px rgba(7,193,96,.08)}
html[data-theme="dark"] .option.active{background:#153423}
.option.coming{opacity:.7}.option strong{font-size:13px}.option span{font-size:12px;color:var(--muted);line-height:1.45}

  return {count:12,actions:`<button class="btn">检查保存位置</button><button class="btn primary" data-action="save-settings">保存设置</button>`,html:`<div class="settings-grid"><div class="card"><div class="card-head"><h2>备份设置</h2></div><div class="card-body stack"><button class="switch-row active"><span><strong>备份前检查文件完整性</strong><br><span class="muted small">开启后先检查文件是否完整，再开始备份。</span></span><span class="toggle"></span></button><button class="switch-row"><span><strong>低电量暂停</strong><br><span class="muted small">笔记本电量较低时暂停长任务。</span></span><span class="toggle"></span></button><button class="switch-row active"><span><strong>外接硬盘断开时暂停</strong><br><span class="muted small">避免导出到外接盘时意外中断。</span></span><span class="toggle"></span></button><button class="switch-row active"><span><strong>完成后通知</strong><br><span class="muted small">任务完成或失败时给出轻量提示。</span></span><span class="toggle"></span></button></div></div><div class="card"><div class="card-head"><h2>存储设置</h2></div><div class="card-body"><div class="setting-row"><div><div class="setting-title">当前备份位置</div><div class="setting-desc">主力账号备份 · 完整路径和健康状态可在详情抽屉中查看。</div></div><div style="display:flex;gap:8px"><button class="btn" data-action="open-drawer" data-drawer="library">查看</button><button class="btn">更换</button></div></div><div class="setting-row"><div><div class="setting-title">默认导出位置</div><div class="setting-desc">~/Documents/WeArchive/Exports</div></div><span class="select-like">已设置</span></div><div class="setting-row"><div><div class="setting-title">缓存上限</div><div class="setting-desc">超过上限后提醒清理，不自动删除原始备份。</div></div><span class="select-like">80GB</span></div><div class="setting-row"><div><div class="setting-title">自动清理策略</div><div class="setting-desc">仅清理临时文件和中间导出文件。</div></div><span class="select-like">30 天</span></div></div></div><div class="card"><div class="card-head"><h2>安全设置</h2></div><div class="card-body stack"><button class="switch-row active"><span><strong>本地备份加密</strong><br><span class="muted small">保护备份数据本身，忘记密码将无法解密。</span></span><span class="toggle"></span></button><button class="switch-row active"><span><strong>导出默认加密</strong><br><span class="muted small">导出加密迁移包时默认要求设置密码。</span></span><span class="toggle"></span></button><button class="switch-row"><span><strong>敏感信息默认隐藏</strong><br><span class="muted small">导出时默认隐藏手机号和微信号。</span></span><span class="toggle"></span></button><button class="switch-row active"><span><strong>操作日志</strong><br><span class="muted small">保留最近 30 天导入、导出和恢复日志。</span></span><span class="toggle"></span></button><button class="switch-row"><span><strong>启动时需要密码（V1）</strong><br><span class="muted small">适合共享设备场景，遗忘后无法找回。</span></span><span class="toggle"></span></button></div></div><div class="card"><div class="card-head"><h2>外观与通知</h2></div><div class="card-body"><div class="setting-row"><div><div class="setting-title">暗黑模式</div><div class="setting-desc">支持浅色、暗色和跟随系统。当前切换会立即生效并持久化保存。</div></div><button class="btn" data-action="toggle-theme">${state.theme==="dark"?"切到浅色":"切到暗色"}</button></div><div class="setting-row"><div><div class="setting-title">主题模式</div><div class="setting-desc">未手动选择时可跟随系统设置。</div></div><span class="select-like">${state.theme==="dark"?"深色":"浅色"}</span></div><div class="setting-row"><div><div class="setting-title">系统外观预览</div><div class="setting-desc">标题栏可切换 macOS / Windows 预览，不影响数据。</div></div><span class="select-like">${$("#windowFrame").dataset.os==="mac"?"macOS":"Windows"}</span></div><div class="setting-row"><div><div class="setting-title">通知方式</div><div class="setting-desc">长任务不只用 Toast，仍会在页面内展示步骤和进度。</div></div><span class="select-like">桌面通知 + 页内状态</span></div></div></div></div>`};
}
function empty(title,desc){return {count:0,actions:"",html:`<div class="empty"><div><strong>${title}</strong><span>${desc}</span><button class="btn" data-action="clear-search">清空搜索</button></div></div>`}}
const views = {home:renderHome,chats:renderChats,contacts:renderContacts,tasks:renderTasks,transfer:renderTransfer,restore:renderRestore,settings:renderSettings};
function renderDrawer(){
  const d = $("#drawer");
  if(!state.drawer){d.className="drawer";d.innerHTML="";return}
  let title="详情", body=`<div class="notice blue"><strong>说明</strong><span>这里显示当前项目的详细信息。</span></div>`;
  if(state.drawer==="library") title="备份位置详情", body=`<div class="notice green"><strong>当前备份位置正常</strong><span>完整度 99.8%，最近检查时间：今天 10:42。</span></div><div class="kv"><div><span>位置名称</span><b>主力账号备份</b></div><div><span>完整路径</span><b>/Users/local/WeArchive/Main</b></div><div><span>已使用空间</span><b>128.6GB</b></div><div><span>可用空间</span><b>412GB</b></div><div><span>数据完整度</span><b>99.8%</b></div><div><span>最近检查时间</span><b>今天 10:42</b></div></div><div class="notice blue"><strong>管理入口</strong><span>如果要更换保存位置或迁移已有数据，请到设置页的存储设置中处理。</span></div><button class="btn primary" data-action="route-settings">前往存储设置</button>`;
  if(state.drawer==="chat") title="会话附件", body=`<div class="stack">${["旧库样例.zip · 1.8GB","合同归档.pdf · 2.4MB","对账截图.zip · 680MB"].map(f=>`<div class="file-row"><span class="task-icon blue">${icon("file")}</span><span class="meta"><strong>${f.split(" · ")[0]}</strong><span>${f.split(" · ")[1]} · 可查看</span></span><span class="badge green">可读取</span></div>`).join("")}</div>`;
  if(state.drawer==="account"){const a=currentAccount(); title="当前账号详情"; body=`<div class="notice blue"><strong>当前操作账号</strong><span>这里会影响首页统计、聊天记录、导入导出和恢复的默认作用范围。</span></div><div class="kv"><div><span>昵称</span><b>${a.name}</b></div><div><span>微信号</span><b>${a.wechat}</b></div><div><span>最近备份</span><b>${a.sync}</b></div><div><span>数据完整度</span><b>${a.complete}</b></div><div><span>会话 / 消息 / 附件</span><b>${fmt(a.sessions)} / ${fmt(a.messages)} / ${fmt(a.attachments)}</b></div></div>`}
  if(state.drawer==="check-report") title="检查报告", body=`<div class="notice amber"><strong>发现 4 个需要注意的问题</strong><span>这些问题不会阻止导入，但可能影响部分附件或消息。</span></div><div class="stack"><div class="file-row"><span class="task-icon amber">${icon("alert")}</span><span class="meta"><strong>4 个附件缺少缩略图</strong><span>导入后仍可保留原文件，但预览会延后生成。</span></span><span class="badge amber">警告</span></div><div class="file-row"><span class="task-icon green">${icon("check")}</span><span class="meta"><strong>消息结构检查通过</strong><span>账号、会话和消息体都可读取。</span></span><span class="badge green">通过</span></div></div>`;
  if(state.drawer==="task"){const t=taskById(state.drawerTaskId)||tasks[0]; title=`${t.title} - 详情`; body=`<div class="notice ${t.status==="failed"?"red":t.status==="partial"?"amber":"blue"}"><strong>${t.statusLabel}</strong><span>当前步骤：${t.step}。已处理消息 / 附件会持续保留。</span></div><div class="step-metrics"><div class="mini-card"><span>总进度</span><strong>${t.progress}%</strong></div><div class="mini-card"><span>当前处理文件</span><strong>${t.currentFile || "无"}</strong></div><div class="mini-card"><span>速度</span><strong>${t.speed}</strong></div><div class="mini-card"><span>预计剩余</span><strong>${t.left}</strong></div></div><div class="kv"><div><span>账号</span><b>${t.account}</b></div><div><span>数据范围</span><b>${t.scope}</b></div><div><span>保存位置</span><b>${t.path}</b></div><div><span>警告 / 错误</span><b>${t.warnings} / ${t.errors}</b></div></div><div class="card"><div class="card-head"><h2>日志</h2><button class="btn flat" data-action="copy-errors">复制错误</button></div><div class="card-body stack">${t.logs.map(log=>`<div class="file-row"><span class="task-icon ${log[0]==="error"?"red":log[0]==="warn"?"amber":"blue"}">${icon(log[0]==="error"?"alert":log[0]==="warn"?"clock":"check")}</span><span class="meta"><strong>${log[1]} · ${log[2]}</strong><span>${log[3] || ""}</span></span><span class="badge ${log[0]==="error"?"red":log[0]==="warn"?"amber":"green"}">${log[0]==="error"?"错误":log[0]==="warn"?"警告":"信息"}</span></div>`).join("")}</div></div>`}
  d.className="drawer open";
  d.innerHTML=`<div class="drawer-head"><h2>${title}</h2><button class="btn icon-btn" data-action="close-drawer">${icon("x")}</button></div><div class="drawer-body">${body}</div>`;
}
function renderFloatingTask(){const card=$("#floatingTask"); const t=runningTask(); const show=t && !["tasks","transfer"].includes(state.view) && !state.floatingDismissed; if(!show){card.className="floating-task hidden";card.innerHTML="";return} const [tone,label]=taskStatusBadge(t.status); card.className="floating-task"; card.innerHTML=`<div class="floating-head"><strong>全局任务指示</strong><button class="btn icon-btn" data-action="dismiss-floating">${icon("x")}</button></div><div style="display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:center"><span class="task-icon ${tone}">${icon(t.type==="backup"?"shield":t.type==="export"?"file":"transfer")}</span><div><div class="strong">${t.title}</div><div class="floating-meta">${t.step} · ${t.left}</div></div></div><div><div class="progress-label"><span>${label}</span><b>${t.progress}%</b></div><div class="progress ${tone}"><span style="width:${t.progress}%"></span></div></div><button class="btn ${t.type==="backup"?"blue":"primary"}" data-action="jump-task-target" data-id="${t.id}">${t.type==="backup"?"去备份任务":"去导入导出"}</button>`}
function toast(text){const area=$("#toastArea"); const node=document.createElement("div"); node.className="toast"; node.innerHTML=`${icon("check")}<span>${esc(text)}</span>`; area.appendChild(node); setTimeout(()=>node.remove(),2600)}
function applyTheme(theme){state.theme = theme; document.documentElement.dataset.theme = theme; localStorage.setItem("wechat-backup-theme",theme)}
function syncSidebar(force=false){const narrow=window.innerWidth<960; if(narrow) state.sidebarCollapsed=true; else if(force || !narrow) state.sidebarCollapsed=state.sidebarPreference; $("#appShell").classList.toggle("sidebar-collapsed", state.sidebarCollapsed)}
function createTask(kind){const acct=currentAccount(); const map={backup:{title:`${acct.name} 手动备份`,type:"backup",label:"备份",scope:"全部会话",step:"正在查找聊天记录",left:"8 分钟"},import:{title:"导入旧电脑备份",type:"import",label:"导入",scope:"18 个会话 / 42,816 条消息",step:"正在保存聊天记录",left:"48 分钟"},export:{title:`聊天记录 ${state.exportFormat==="package"?"加密迁移包":"HTML 归档"}`,type:"export",label:"导出",scope:state.exportRange==="selected"?"指定会话":"指定范围",step:"正在收集聊天记录",left:"12 分钟"},restore:{title:"恢复到微信",type:"restore",label:"恢复",scope:"指定会话",step:"正在传输聊天记录",left:"8 分钟"}}; const base=map[kind]; tasks.unshift({id:"t"+Date.now(),account:acct.name,status:"running",statusLabel:base.step,progress:8,start:"刚刚",elapsed:"刚开始",path:"主力账号备份",errors:0,warnings:0,currentFile:"准备中",speed:"-",logs:[["info","刚刚",`已创建${base.label}任务`]],...base}); state.floatingDismissed=false}
document.addEventListener("click",e=>{
  const nav=e.target.closest(".nav-btn");
  if(nav){state.view=nav.dataset.view; render(); return}
  const el=e.target.closest("[data-action]");
  if(!el || el.disabled) return;
  const a=el.dataset.action;
  if(a==="toggle-sidebar"){state.sidebarPreference=!state.sidebarCollapsed; state.sidebarCollapsed=!state.sidebarCollapsed; if(window.innerWidth<960){state.sidebarPreference=true; state.sidebarCollapsed=true} $("#appShell").classList.toggle("sidebar-collapsed",state.sidebarCollapsed); return}
  if(a==="set-os"){$("#windowFrame").dataset.os=el.dataset.os; $$(".os-switch button").forEach(b=>b.classList.toggle("active",b===el)); render(); return}
  if(a==="clear-search"){state.query=""; $("#globalSearch").value=""; render(); toast("已清空搜索"); return}
  if(a==="switch-account"){state.currentAccount=el.dataset.id; toast("已切换到 "+currentAccount().name); render(); return}
  if(a==="scan-account"){toast("正在重新扫描本机微信账号"); return}
  if(a==="new-backup"){createTask("backup"); state.view="tasks"; toast("已创建备份任务"); render(); return}
  if(a==="route-chats"){state.view="chats"; render(); return}
  if(a==="route-tasks"){state.view="tasks"; render(); return}
  if(a==="route-settings"){state.view="settings"; state.drawer=null; render(); return}
  if(a==="route-restore"){state.view="restore"; render(); return}
  if(a==="route-transfer-import"){state.view="transfer"; state.transferMode="import"; render(); return}
  if(a==="route-transfer-export"){state.view="transfer"; state.transferMode="export"; render(); return}
  if(a==="toggle-batch"){state.batch=!state.batch; if(!state.batch) state.selectedChats.clear(); render(); return}
  if(a==="select-chat"){if(state.batch){state.selectedChats.has(el.dataset.id)?state.selectedChats.delete(el.dataset.id):state.selectedChats.add(el.dataset.id)} state.selectedChat=el.dataset.id; render(); return}
  if(a==="toggle-chat-attachments"){state.chatFilters.attachments=!state.chatFilters.attachments; render(); return}
  if(a==="set-chat-type"){state.chatFilters.type = state.chatFilters.type===el.dataset.type?"all":el.dataset.type; render(); return}
  if(a==="set-chat-date"){state.chatFilters.date = el.dataset.date; render(); return}
  if(a==="clear-chat-filters"){state.chatFilters={attachments:false,type:"all",date:"all"}; render(); return}
  if(a==="select-contact"){state.selectedContact=el.dataset.id; render(); return}
  if(a==="set-contact-category"){state.contactCategory=el.dataset.category; render(); return}
  if(a==="jump-chat"){state.selectedChat=el.dataset.id || state.selectedChat; state.view="chats"; render(); return}
  if(a==="open-drawer"){state.drawer=el.dataset.drawer; render(); return}
  if(a==="close-drawer"){state.drawer=null; render(); return}
  if(a==="open-task"){state.drawer="task"; state.drawerTaskId=el.dataset.id; render(); return}
  if(a==="toggle-task"){const t=taskById(el.dataset.id); if(t){if(t.status==="running"){t.status="paused";t.statusLabel="已暂停，已完成部分会保留";t.left="已暂停";t.step="已暂停，已完成部分会保留";}else if(t.status==="paused"){t.status="running";t.statusLabel="继续处理中";t.left="5 分钟";t.step="正在从上次位置继续";} render()} return}
  if(a==="cancel-task"){const t=taskById(el.dataset.id); if(t){t.status="failed";t.statusLabel="任务已取消";t.step="用户取消，已完成部分会保留";t.errors+=1; render(); toast("已取消任务，已完成部分会保留");} return}
  if(a==="start-waiting"){const t=taskById(el.dataset.id); if(t){t.status="running";t.statusLabel="正在收集聊天记录";t.step="正在收集聊天记录";t.left="12 分钟"; render(); toast("任务已开始");} return}
  if(a==="retry-task"){const t=taskById(el.dataset.id); if(t){t.status="running";t.statusLabel="正在重试";t.step="从失败位置继续处理";t.left="10 分钟";t.progress=Math.max(12,t.progress-20); render(); toast("已重新加入任务队列");} return}
  if(a==="pause-all"){tasks=tasks.map(t=>t.status==="running"?{...t,status:"paused",statusLabel:"已暂停，已完成部分会保留",step:"已暂停，已完成部分会保留",left:"已暂停"}:t); render(); toast("已暂停所有进行中的任务"); return}
  if(a==="set-transfer-mode"){state.transferMode=el.dataset.mode; render(); return}
  if(a==="jump-step"){const n=Number(el.dataset.step); if(state.transferMode==="export") state.exportStep=n; else state.importStep=n; render(); return}
  if(a==="step-back"){if(state.transferMode==="export") state.exportStep=Math.max(0,state.exportStep-1); else state.importStep=Math.max(0,state.importStep-1); render(); return}
  if(a==="step-next"){
    if(state.transferMode==="import"){
      if(state.importStep===1 && !state.importFilesSelected){toast("请先选择文件或目录"); return}
      if(state.importStep<4) state.importStep++;
      else {createTask("import"); toast("导入任务已加入底部任务队列");}
    } else {
      if(state.exportStep===2 && state.exportFormat==="package" && !state.exportEncryptReady){toast("请先设置迁移包密码"); return}
      if(state.exportStep===3 && !state.exportSavePath){toast("请先选择保存位置"); return}
      if(state.exportStep<4) state.exportStep++;
      else {createTask("export"); toast("导出任务已加入底部任务队列");}
    }
    render(); return
  }
  if(a==="set-import-source"){state.importSource=el.dataset.source; render(); return}
  if(a==="choose-import-files"){state.importFilesSelected=true; toast("已选择导入来源"); render(); return}
  if(a==="toggle-import-check"){state.importCheckPaused=!state.importCheckPaused; render(); return}
  if(a==="set-import-strategy"){state.importStrategy=el.dataset.strategy; render(); return}
  if(a==="set-import-attachment"){state.importAttachmentPolicy=el.dataset.policy; render(); return}
  if(a==="set-export-range"){state.exportRange=el.dataset.range; render(); return}
  if(a==="set-format"){state.exportFormat=el.dataset.value; render(); return}
  if(a==="toggle-export-password"){state.exportEncryptReady=!state.exportEncryptReady; render(); toast(state.exportEncryptReady?"迁移包密码已设置":"已清除迁移包密码"); return}
  if(a==="choose-path"){state.exportSavePath=true; toast("保存位置检查通过"); render(); return}
  if(a==="set-restore-step"){state.restoreStep=Number(el.dataset.step); render(); return}
  if(a==="restore-back"){state.restoreStep=Math.max(0,state.restoreStep-1); render(); return}
  if(a==="restore-next"){if(state.restoreStep===1 && !state.restoreDeviceConnected){toast("请先连接目标设备"); return} if(state.restoreStep===3 && !state.restoreAck){toast("请先确认风险"); return} if(state.restoreStep<4){state.restoreStep++;} else {createTask("restore"); toast("恢复任务已创建，请保持目标设备在线");} render(); return}
  if(a==="set-restore-range"){state.restoreRange=el.dataset.range; render(); return}
  if(a==="set-restore-strategy"){state.restoreStrategy=el.dataset.strategy; render(); return}
  if(a==="toggle-restore-ack"){state.restoreAck=!state.restoreAck; render(); return}
  if(a==="toggle-theme"){applyTheme(state.theme==="dark"?"light":"dark"); render(); return}
  if(a==="save-settings"){toast("设置已保存"); return}
  if(a==="jump-task-target"){const t=taskById(el.dataset.id); state.view = t && t.type==="backup" ? "tasks" : "transfer"; render(); return}
  if(a==="dismiss-floating"){state.floatingDismissed=true; render(); return}
  if(a==="open-location"){toast("已打开文件夹"); return}
  if(a==="copy-errors"){toast("错误信息已复制"); return}
  if(a==="retry-chat-backup"){createTask("backup"); toast("已为当前会话创建补备份任务"); render(); return}
  if(a==="jump-message"){const mark = $("#main mark"); if(mark){mark.scrollIntoView({block:"center"}); toast("已定位第一个命中");} else toast("当前没有搜索命中"); return}
  toast("操作已记录")
});
$("#globalSearch").addEventListener("input",e=>{state.query=e.target.value.trim(); render()});
$("#globalSearch").addEventListener("keydown",e=>{if(e.key==="Escape"){state.query=""; e.target.value=""; render(); toast("已清空搜索")} if(e.key==="Enter"){const mark=$("#main mark"); if(mark){mark.scrollIntoView({block:"center"}); toast("已定位第一个结果")}}});
window.addEventListener("resize",()=>syncSidebar());
setInterval(()=>{let changed=false;tasks=tasks.map(t=>{if(t.status==="running"&&t.progress<100){const next=Math.min(100,t.progress+(t.type==="backup"?2:3)); changed=true; return {...t,progress:next,left:next===100?"完成":Math.max(1,Math.ceil((100-next)/8))+" 分钟",status:next===100?"done":t.status,statusLabel:next===100?"任务完成":t.statusLabel,step:next===100?"任务完成":t.step};}return t}); if(changed) render();},2200);
applyTheme(localStorage.getItem("wechat-backup-theme") || document.documentElement.dataset.theme);
syncSidebar(true);
render();
